name: macOS DMG

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-dmg:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies via Homebrew
        run: |
          brew install qt@6 ninja create-dmg fftw

      - name: Configure
        run: |
          cmake -B build -G "Unix Makefiles" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_DEPLOYMENT_TARGET="14.0" \
            -DCMAKE_PREFIX_PATH="$(brew --prefix)"

      - name: Build
        run: cmake --build build -j$(sysctl -n hw.ncpu)

      - name: Bundle Qt frameworks
        run: |
          $(brew --prefix qt@6)/bin/macdeployqt build/NereusSDR.app \
            -verbose=1 \
            -always-overwrite

      - name: Create DMG
        run: |
          create-dmg \
            --volname "NereusSDR" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "NereusSDR.app" 150 110 \
            --hide-extension "NereusSDR.app" \
            --app-drop-link 450 110 \
            "NereusSDR-${{ github.ref_name }}-macOS-apple-silicon.dmg" \
            "build/NereusSDR.app" \
          || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macOS-DMG
          path: NereusSDR-*.dmg

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: NereusSDR-*.dmg
